name: Scraper scheduled runner

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Newline-separated URLs to scrape (overrides default jobs)'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC

jobs:
  run-scrapers:
    runs-on: ubuntu-latest
    concurrency:
      group: scraper-runner
      cancel-in-progress: false
    env:
      BACKEND_URL: ${{ secrets.SCRAPER_BACKEND_URL }}
      SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Scrapper/requirements.txt

      - name: Install Playwright Chromium and system dependencies
        run: |
          python -m playwright install --with-deps chromium

      - name: Validate scraper configuration
        shell: bash
        run: |
          if [[ -z "$BACKEND_URL" || -z "$SCRAPER_API_KEY" ]]; then
            echo "::error::Set SCRAPER_BACKEND_URL and SCRAPER_API_KEY in repository Actions secrets."
            exit 1
          fi

      - name: Run scraper CI runner
        env:
          JOB_URLS: ${{ github.event.inputs.urls }}
        run: |
          python Scrapper/ci_runner.py --backend "${{ env.BACKEND_URL }}" --key "${{ env.SCRAPER_API_KEY }}" --urls "${{ env.JOB_URLS }}"
